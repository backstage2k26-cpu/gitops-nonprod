apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: macair-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-champ/macair.git
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - ../../values/macair/values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: macair-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
