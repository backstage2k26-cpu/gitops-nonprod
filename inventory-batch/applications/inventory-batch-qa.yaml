apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: inventory-batch-qa
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://github.com/devops-champ/inventory-batch.git
      targetRevision: 0.0.5
      path: helm/app

      helm:
        valueFiles:
          - $values/inventory-batch/values/values-qa.yaml

    - repoURL: https://github.com/backstage2k26-cpu/gitops-nonprod.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: inventory-batch-qa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true