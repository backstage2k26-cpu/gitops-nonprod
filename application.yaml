apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argoapps-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-champ/argoapps.git
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - ../gitops-nonprod/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argoapps-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
