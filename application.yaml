apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-qa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-champ/payment.git
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - ../gitops-nonprod/qa/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: payment-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
