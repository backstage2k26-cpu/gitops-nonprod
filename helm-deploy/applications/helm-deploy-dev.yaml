apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-deploy-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/devops-champ/helm-deploy.git
      targetRevision: HEAD
      path: helm/app
      helm:
        valueFiles:
          - $values/helm-deploy/values/values-dev.yaml
    - repoURL: https://github.com/backstage2k26-cpu/gitops-nonprod.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-deploy-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
